<style>
  /* Fixed light theme — the Homey pairing webview mixes its own base styles,
     so we pin high-contrast colors instead of following prefers-color-scheme. */
  :root {
    --gold: #EEBF00;
    --gold-press: #d9ae00;
    --bg: #f2f2f5;
    --card: #ffffff;
    --text: #1b1b1f;
    --muted: #66666e;
    --border: #e2e2e8;
    --field-border: #c9c9d2;
    --badge-bg: #eeeef2;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg) !important; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 18px 16px 28px; }

  .hero { text-align: center; padding: 8px 0 18px; }
  .hero-badge {
    width: 66px; height: 66px; margin: 0 auto 10px;
    background: var(--gold); border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(238,191,0,.35);
  }
  .hero-badge svg { width: 40px; height: 40px; }
  .hero-title { font-size: 21px; font-weight: 700; letter-spacing: -.2px; }
  .hero-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 14px;
  }
  .card-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 650; margin-bottom: 12px;
  }
  .card-head .ci {
    width: 26px; height: 26px; border-radius: 8px; background: var(--badge-bg);
    display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .card-head .ci svg { width: 15px; height: 15px; }

  .fld {
    width: 100%; padding: 12px 12px; margin: 6px 0;
    font-size: 15px; color: #1b1b1f !important; background-color: #ffffff !important;
    border: 1px solid var(--field-border);
    border-radius: 10px; outline: none; -webkit-appearance: none; appearance: none;
  }
  .fld::placeholder { color: #9a9aa2; opacity: 1; }
  .fld:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(238,191,0,.25); }
  select.fld {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%238a8a92' stroke-width='1.6' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px;
  }
  .field-label { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 4px; display: block; }
  .field-label .sub { font-weight: 400; color: var(--muted); }

  .btn {
    width: 100%; padding: 12px 14px; font-size: 14px; font-weight: 650;
    border-radius: 12px; border: 1px solid var(--field-border);
    background: #ffffff; color: #1b1b1f; cursor: pointer;
    -webkit-appearance: none; appearance: none;
  }
  .btn:active { transform: translateY(1px); }
  .btn.secondary { background: #ffffff; }
  .btn.primary {
    background: var(--gold) !important; border-color: var(--gold); color: #1a1a1e !important;
    font-weight: 800; padding: 18px 20px; font-size: 17px; border-radius: 14px;
    margin-top: 16px; box-shadow: 0 6px 16px rgba(238,191,0,.45);
  }
  .btn.primary:active { background: var(--gold-press); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.ghost { border: 1px dashed var(--field-border); background: transparent; color: var(--muted); }

  #results { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  #results .btn { padding: 10px 12px; text-align: left; }

  #status { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); margin: 10px 0 0; line-height: 1.5; }
  #status .st-text { flex: 1 1 auto; }
  .spinner {
    width: 15px; height: 15px; flex: 0 0 auto;
    border: 2px solid rgba(0,0,0,.15); border-top-color: var(--gold);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status code, .hint code {
    background: var(--badge-bg); padding: 1px 5px; border-radius: 5px;
    font-size: 12px; word-break: break-all;
  }
  .hint { font-size: 12.5px; color: var(--muted); margin: 10px 2px 0; line-height: 1.6; }

  .camera-row { border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; background: var(--bg); }
  .cam-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cam-badge {
    width: 22px; height: 22px; border-radius: 999px; background: var(--gold); color: #1a1a1e;
    font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .cam-title { font-size: 13px; font-weight: 600; flex: 1 1 auto; }
  .cam-remove {
    border: none; background: transparent; color: var(--muted); font-size: 20px; line-height: 1;
    cursor: pointer; padding: 0 4px;
  }
  .divider { height: 1px; background: var(--border); border: 0; margin: 14px 0; }
</style>

<script type="text/javascript">
  var H = null;
  var started = false;
  var MAX_CAMERAS = 8;
  var repairMode = false;
  var LANG = 'en';

  // ---- i18n -----------------------------------------------------------------
  var STR = {
    en: {
      initializing: 'Initializing…',
      loadingDevices: 'Loading devices…',
      foundDevices: 'Found {0} lock(s), {1} sensor(s).',
      loadFail: 'Could not load devices: {0}',
      editing: 'Editing this device — change cameras or linked devices, then save.',
      searching: 'Searching the local network for cameras… (a few seconds)',
      noCams: 'No cameras found. Enter the stream URL manually.',
      foundCams: 'Found {0} candidate(s). Pick one.',
      searchFail: 'Search failed: {0}',
      use: 'Use {0}',
      onvifTag: ' (ONVIF)',
      portTag: ' (port {0})',
      gettingUrl: 'Getting stream URL from {0}…',
      onvifAdded: 'Stream URL added from ONVIF.',
      noUri: 'No stream URL returned; enter manually.',
      onvifFail: 'ONVIF failed ({0}). Check credentials or enter manually.',
      templateAdded: 'Template added for {0} — replace <user>:<pass> and <path>, e.g. {1}',
      needUrl: 'Please enter the stream URL for Camera 1.',
      heroSub: 'Set up your video doorbell, lock and sensors.',
      findCameras: 'Find cameras on the network',
      onvifUser: 'ONVIF username (for auto URL)',
      onvifPass: 'ONVIF password',
      searchBtn: 'Search cameras',
      camerasLabel: 'Cameras',
      linkedLabel: 'Linked devices (optional)',
      cameraReq: 'Camera {0} · required',
      cameraOpt: 'Camera {0} · optional',
      camNamePh: 'Name (e.g. Front Door)',
      addCam: '+ Add camera',
      hint: 'Supports RTSP, HLS (.m3u8), RTMP and DASH (.mpd) streams.<br>'
        + 'Example: <code>rtsp://user:pass@192.168.1.10:554/stream</code><br>'
        + '“Search cameras” finds RTSP cameras on your network.',
      lockLabel: 'Door lock',
      doorbellLabel: 'Doorbell sensor',
      motionLabel: 'Motion sensor',
      optional: 'optional',
      addDevice: 'Add device',
      saveChanges: 'Save changes',
      deviceName: 'Video Doorbell',
    },
    ko: {
      initializing: '초기화 중…',
      loadingDevices: '기기 불러오는 중…',
      foundDevices: '도어락 {0}개, 센서 {1}개를 찾았습니다.',
      loadFail: '기기를 불러오지 못했습니다: {0}',
      editing: '이 기기를 편집 중입니다 — 카메라나 연동 기기를 변경한 뒤 저장하세요.',
      searching: '로컬 네트워크에서 카메라를 검색 중… (몇 초 소요)',
      noCams: '카메라를 찾지 못했습니다. 스트림 주소를 직접 입력하세요.',
      foundCams: '후보 {0}개를 찾았습니다. 하나를 선택하세요.',
      searchFail: '검색 실패: {0}',
      use: '{0} 사용',
      onvifTag: ' (ONVIF)',
      portTag: ' (포트 {0})',
      gettingUrl: '{0}에서 스트림 주소를 가져오는 중…',
      onvifAdded: 'ONVIF에서 스트림 주소를 추가했습니다.',
      noUri: '스트림 주소를 받지 못했습니다. 직접 입력하세요.',
      onvifFail: 'ONVIF 실패 ({0}). 인증 정보를 확인하거나 직접 입력하세요.',
      templateAdded: '{0}에 템플릿을 추가했습니다 — <user>:<pass>와 <path>를 실제 값으로 바꾸세요. 예: {1}',
      needUrl: '카메라 1의 스트림 주소를 입력하세요.',
      heroSub: '비디오 도어벨·도어락·센서를 설정하세요.',
      findCameras: '네트워크에서 카메라 검색',
      onvifUser: 'ONVIF 사용자명 (자동 주소용)',
      onvifPass: 'ONVIF 비밀번호',
      searchBtn: '카메라 검색',
      camerasLabel: '카메라',
      linkedLabel: '연동 기기 (선택)',
      cameraReq: '카메라 {0} · 필수',
      cameraOpt: '카메라 {0} · 선택',
      camNamePh: '이름 (예: 현관)',
      addCam: '+ 카메라 추가',
      hint: 'RTSP, HLS(.m3u8), RTMP, DASH(.mpd) 스트림을 지원합니다.<br>'
        + '예: <code>rtsp://user:pass@192.168.1.10:554/stream</code><br>'
        + '“카메라 검색”은 네트워크의 RTSP 카메라를 찾습니다.',
      lockLabel: '도어락',
      doorbellLabel: '초인종 센서',
      motionLabel: '모션 센서',
      optional: '선택',
      addDevice: '기기 추가',
      saveChanges: '변경사항 저장',
      deviceName: '비디오 도어벨',
    },
  };

  function t(key) {
    var table = STR[LANG] || STR.en;
    var s = (table[key] != null) ? table[key] : STR.en[key];
    if (s == null) return key;
    for (var i = 1; i < arguments.length; i++) {
      s = s.replace('{' + (i - 1) + '}', arguments[i]);
    }
    return s;
  }

  function init(homeyObj) {
    if (started) return;
    var ref = homeyObj || (typeof Homey !== 'undefined' ? Homey : null);
    if (!ref) return;                              // Homey object not ready yet
    if (!document.getElementById('cameras')) return; // DOM not ready yet
    started = true;
    H = ref;
    try { H.ready(); } catch (e) { /* ignore */ }
    uilog('boot: init ok');
    try { wireButtons(); } catch (e) { uilog('wireButtons error: ' + e); }
    bootstrap();
  }

  async function bootstrap() {
    try {
      var lang = await H.emit('getLanguage');
      if (lang === 'ko') LANG = 'ko';
    } catch (e) { /* default en */ }
    applyStaticI18n();
    setStatus(t('initializing'));
    try { addCameraRow(); } catch (e) { uilog('addCameraRow error: ' + e); }
    await loadDevices();
    try {
      var cfg = await H.emit('getConfig');
      if (cfg) applyConfigToForm(cfg);
    } catch (e) { uilog('getConfig error: ' + (e && e.message ? e.message : e)); }
  }

  function applyStaticI18n() {
    setText('heroTitle', t('deviceName'));
    setText('heroSub', t('heroSub'));
    setText('findCamerasLabel', t('findCameras'));
    setPlaceholder('ou', t('onvifUser'));
    setPlaceholder('op', t('onvifPass'));
    setText('searchBtn', t('searchBtn'));
    setText('camerasLabel', t('camerasLabel'));
    setText('addCam', t('addCam'));
    var hint = document.getElementById('hint');
    if (hint) hint.innerHTML = t('hint');
    setText('linkedLabel', t('linkedLabel'));
    setLabelWithSub('lockLabel', t('lockLabel'), t('optional'));
    setLabelWithSub('doorbellLabel', t('doorbellLabel') + ' · 초인종 (벨 눌림)', t('optional'));
    setLabelWithSub('motionLabel', t('motionLabel') + ' · 모션 (서성임 감지)', t('optional'));
    setText('addDevice', repairMode ? t('saveChanges') : t('addDevice'));
  }

  function setText(id, text) { var el = document.getElementById(id); if (el) el.textContent = text; }
  function setPlaceholder(id, text) { var el = document.getElementById(id); if (el) el.placeholder = text; }
  function setLabelWithSub(id, main, sub) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = main + ' <span class="sub">— ' + sub + '</span>';
  }

  // Repair mode: pre-fill the form with the device's current configuration.
  function applyConfigToForm(cfg) {
    repairMode = true;
    var slots = [
      ['rtsp_url', 'camera_name'], ['rtsp_url_2', 'camera_name_2'],
      ['rtsp_url_3', 'camera_name_3'], ['rtsp_url_4', 'camera_name_4'],
      ['rtsp_url_5', 'camera_name_5'], ['rtsp_url_6', 'camera_name_6'],
      ['rtsp_url_7', 'camera_name_7'], ['rtsp_url_8', 'camera_name_8'],
    ];
    var cams = [];
    slots.forEach(function (k) {
      var u = (cfg[k[0]] || '').trim();
      if (u) cams.push({ url: u, name: (cfg[k[1]] || '').trim() });
    });
    if (cams.length) {
      document.getElementById('cameras').innerHTML = '';
      cams.forEach(function (c) {
        addCameraRow();
        var rows = document.querySelectorAll('#cameras .camera-row');
        var row = rows[rows.length - 1];
        row.querySelector('.cam-url').value = c.url;
        row.querySelector('.cam-name').value = c.name;
      });
    }
    if (cfg.lock_id) document.getElementById('lock').value = cfg.lock_id;
    if (cfg.doorbell_id) document.getElementById('doorbell').value = cfg.doorbell_id;
    if (cfg.motion_id) document.getElementById('motion').value = cfg.motion_id;
    setText('addDevice', t('saveChanges'));
    setStatus(t('editing'));
  }

  // Trigger init via every available mechanism (contract varies by version).
  function onHomeyReady(homeyObj) { init(homeyObj); }
  document.addEventListener('DOMContentLoaded', function () { init(); });
  window.addEventListener('load', function () { init(); });
  (function poll(n) {
    if (started) return;
    init();
    if (n > 0) setTimeout(function () { poll(n - 1); }, 100);
  })(60);

  function uilog(msg) {
    try { if (H && H.emit) H.emit('uilog', String(msg)); } catch (e) { /* ignore */ }
  }

  function setStatus(msg, loading) {
    var el = document.getElementById('status');
    if (!el) return;
    el.innerHTML = (loading ? '<span class="spinner"></span>' : '') + '<span class="st-text">' + (msg || '') + '</span>';
  }

  function wireButtons() {
    document.getElementById('searchBtn').addEventListener('click', searchCameras);
    document.getElementById('addCam').addEventListener('click', addCameraRow);
    document.getElementById('addDevice').addEventListener('click', pair);
  }

  async function loadDevices() {
    setStatus(t('loadingDevices'), true);
    uilog('loadDevices: calling listLocks/listSensors');
    try {
      var locks = (await H.emit('listLocks')) || [];
      var sensors = (await H.emit('listSensors')) || [];
      uilog('loadDevices: ' + locks.length + ' locks, ' + sensors.length + ' sensors');
      fill('lock', locks, true);
      fill('doorbell', sensors, true);
      fill('motion', sensors, true);
      setStatus(t('foundDevices', locks.length, sensors.length));
    } catch (e) {
      var msg = (e && e.message ? e.message : e);
      uilog('loadDevices error: ' + msg);
      setStatus(t('loadFail', msg));
    }
  }

  function fill(id, list, optional) {
    var sel = document.getElementById(id);
    sel.innerHTML = optional ? '<option value="">—</option>' : '';
    (list || []).forEach(function (d) {
      var o = document.createElement('option');
      o.value = d.id;
      o.textContent = d.name;
      sel.appendChild(o);
    });
  }

  function nameOf(id) {
    var sel = document.getElementById(id);
    return sel.selectedOptions[0] ? sel.selectedOptions[0].textContent : '';
  }

  function cameraCount() {
    return document.querySelectorAll('#cameras .camera-row').length;
  }

  function renumberCameras() {
    var rows = document.querySelectorAll('#cameras .camera-row');
    rows.forEach(function (row, i) {
      row.querySelector('.cam-badge').textContent = (i + 1);
      row.querySelector('.cam-title').textContent = (i === 0 ? t('cameraReq', i + 1) : t('cameraOpt', i + 1));
      var rm = row.querySelector('.cam-remove');
      rm.style.display = (i === 0) ? 'none' : '';
    });
    document.getElementById('addCam').disabled = cameraCount() >= MAX_CAMERAS;
  }

  function addCameraRow() {
    var n = cameraCount() + 1;
    if (n > MAX_CAMERAS) return;
    var wrap = document.createElement('div');
    wrap.className = 'camera-row';

    var head = document.createElement('div');
    head.className = 'cam-head';
    var badge = document.createElement('span');
    badge.className = 'cam-badge';
    var title = document.createElement('span');
    title.className = 'cam-title';
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'cam-remove';
    rm.textContent = '×';
    rm.addEventListener('click', function () { wrap.parentNode.removeChild(wrap); renumberCameras(); });
    head.appendChild(badge);
    head.appendChild(title);
    head.appendChild(rm);

    var name = document.createElement('input');
    name.className = 'fld cam-name';
    name.type = 'text';
    name.placeholder = t('camNamePh');
    var url = document.createElement('input');
    url.className = 'fld cam-url';
    url.type = 'text';
    url.placeholder = 'rtsp://user:pass@192.168.1.10:554/stream';

    wrap.appendChild(head);
    wrap.appendChild(name);
    wrap.appendChild(url);
    document.getElementById('cameras').appendChild(wrap);
    renumberCameras();
  }

  function fillFirstEmptyCamera(url, name) {
    var rows = Array.prototype.slice.call(document.querySelectorAll('#cameras .camera-row'));
    var row = rows.filter(function (r) { return !r.querySelector('.cam-url').value.trim(); })[0];
    if (!row) { addCameraRow(); rows = Array.prototype.slice.call(document.querySelectorAll('#cameras .camera-row')); row = rows[rows.length - 1]; }
    if (!row) return;
    row.querySelector('.cam-url').value = url;
    if (name && !row.querySelector('.cam-name').value.trim()) row.querySelector('.cam-name').value = name;
  }

  async function searchCameras() {
    setStatus(t('searching'), true);
    document.getElementById('results').innerHTML = '';
    uilog('searchCameras: calling discoverCameras');
    try {
      var cams = (await H.emit('discoverCameras')) || [];
      uilog('searchCameras: ' + cams.length + ' candidates');
      if (!cams.length) { setStatus(t('noCams')); return; }
      setStatus(t('foundCams', cams.length));
      var box = document.getElementById('results');
      cams.forEach(function (c) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn secondary';
        var tag = c.onvif ? t('onvifTag') : (c.rtspPort ? t('portTag', c.rtspPort) : '');
        btn.textContent = t('use', c.name) + tag;
        btn.addEventListener('click', function () { useCandidate(c); });
        box.appendChild(btn);
      });
    } catch (e) {
      var msg = (e && e.message ? e.message : e);
      uilog('searchCameras error: ' + msg);
      setStatus(t('searchFail', msg));
    }
  }

  async function useCandidate(c) {
    if (c.onvif) {
      var username = document.getElementById('ou').value.trim();
      var password = document.getElementById('op').value;
      setStatus(t('gettingUrl', c.ip), true);
      try {
        var uri = await H.emit('resolveStreamUri', { ip: c.ip, onvifPort: c.onvifPort, username: username, password: password });
        if (uri) { fillFirstEmptyCamera(uri, c.ip); setStatus(t('onvifAdded')); } else setStatus(t('noUri'));
      } catch (e) {
        setStatus(t('onvifFail', (e && e.message ? e.message : e)));
      }
    } else {
      var port = (c.rtspPort || 554);
      var template = 'rtsp://<user>:<pass>@' + c.ip + ':' + port + '/<path>';
      fillFirstEmptyCamera(template, c.ip);
      setStatus(t('templateAdded', c.ip, 'rtsp://839:573@' + c.ip + ':' + port + '/ch2'));
    }
  }

  async function pair() {
    var rows = Array.prototype.slice.call(document.querySelectorAll('#cameras .camera-row'));
    var cams = rows.map(function (r) {
      return { name: r.querySelector('.cam-name').value.trim(), url: r.querySelector('.cam-url').value.trim() };
    });
    if (!cams[0] || !cams[0].url) { H.alert(t('needUrl')); return; }

    var settings = {
      lock_id: document.getElementById('lock').value,
      doorbell_id: document.getElementById('doorbell').value,
      motion_id: document.getElementById('motion').value,
      lock_name: nameOf('lock'),
      doorbell_name: nameOf('doorbell'),
      motion_name: nameOf('motion'),
    };
    // Clear all camera slots first so removed cameras don't linger.
    for (var i = 0; i < MAX_CAMERAS; i++) {
      var suf = i === 0 ? '' : '_' + (i + 1);
      settings['rtsp_url' + suf] = '';
      settings['camera_name' + suf] = '';
    }
    cams.forEach(function (c, i) {
      var suffix = i === 0 ? '' : '_' + (i + 1);
      settings['rtsp_url' + suffix] = c.url;
      settings['camera_name' + suffix] = c.name;
    });

    H.showLoadingOverlay();
    try {
      if (repairMode) {
        await H.emit('saveConfig', settings);
      } else {
        await H.createDevice({ name: cams[0].name || t('deviceName'), data: { id: 'smartdoor-' + Date.now() }, settings: settings });
      }
      await H.done();
    } catch (e) {
      H.hideLoadingOverlay();
      H.alert(e && e.message ? e.message : String(e));
    }
  }
</script>

<div class="wrap">
  <div class="hero">
    <div class="hero-badge">
      <svg viewBox="0 0 24 24" fill="#1a1a1e"><path d="M14 15C14 16.11 13.11 17 12 17S10 16.11 10 15 10.9 13 12 13 14 13.9 14 15M18 4V20C18 21.1 17.11 22 16 22H8C6.9 22 6 21.11 6 20V4C6 2.9 6.9 2 8 2H16C17.11 2 18 2.9 18 4M10.5 7C10.5 7.83 11.17 8.5 12 8.5S13.5 7.83 13.5 7 12.83 5.5 12 5.5 10.5 6.17 10.5 7M16 10H8V20H16V10Z"/></svg>
    </div>
    <div class="hero-title" id="heroTitle">Video Doorbell</div>
    <div class="hero-sub" id="heroSub"></div>
  </div>

  <section class="card">
    <div class="card-head">
      <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
      <span id="findCamerasLabel">Find cameras on the network</span>
    </div>
    <input class="fld" id="ou" type="text" placeholder="ONVIF username (for auto URL)" />
    <input class="fld" id="op" type="password" placeholder="ONVIF password" />
    <button class="btn secondary" type="button" id="searchBtn">Search cameras</button>
    <div id="results"></div>
    <p id="status"></p>
  </section>

  <section class="card">
    <div class="card-head">
      <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></span>
      <span id="camerasLabel">Cameras</span>
    </div>
    <div id="cameras"></div>
    <button class="btn ghost" type="button" id="addCam">+ Add camera</button>
    <p id="hint" class="hint"></p>
  </section>

  <section class="card">
    <div class="card-head">
      <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg></span>
      <span id="linkedLabel">Linked devices (optional)</span>
    </div>
    <label class="field-label" id="lockLabel" for="lock">Door lock</label>
    <select class="fld" id="lock"></select>
    <label class="field-label" id="doorbellLabel" for="doorbell">Doorbell sensor</label>
    <select class="fld" id="doorbell"></select>
    <label class="field-label" id="motionLabel" for="motion">Motion sensor</label>
    <select class="fld" id="motion"></select>
  </section>

  <button class="btn primary" type="button" id="addDevice">Add device</button>
</div>
