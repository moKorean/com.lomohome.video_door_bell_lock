<script type="text/javascript">
  let Homey;
  const MAX_CAMERAS = 4;

  function onHomeyReady(homeyReady) {
    Homey = homeyReady;
    Homey.setTitle({ en: 'Set up Smart Door', ko: '스마트 도어 설정' });
    addCameraRow();
    loadDevices();
    Homey.ready();
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg || '';
  }

  async function loadDevices() {
    setStatus('Loading devices…');
    try {
      const locks = (await Homey.emit('listLocks')) || [];
      const sensors = (await Homey.emit('listSensors')) || [];
      fill('lock', locks, true);
      fill('doorbell', sensors, true);
      fill('motion', sensors, true);
      setStatus('Found ' + locks.length + ' lock(s), ' + sensors.length + ' sensor(s).');
    } catch (e) {
      setStatus('Could not load devices: ' + (e && e.message ? e.message : e) + ' — you can still enter the RTSP URL and retry.');
    }
  }

  async function searchCameras() {
    setStatus('Searching the local network for cameras… (this takes a few seconds)');
    document.getElementById('results').innerHTML = '';
    try {
      const cams = (await Homey.emit('discoverCameras')) || [];
      if (!cams.length) { setStatus('No cameras found. Enter the RTSP URL manually below.'); return; }
      setStatus('Found ' + cams.length + ' candidate(s). Pick one to fill in a camera.');
      const box = document.getElementById('results');
      cams.forEach((c) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'homey-button-secondary-full';
        btn.style.marginBottom = '4px';
        btn.textContent = 'Use ' + c.name + (c.onvif ? ' (ONVIF)' : (c.rtspPort ? ' (port ' + c.rtspPort + ')' : ''));
        btn.onclick = () => useCandidate(c);
        box.appendChild(btn);
      });
    } catch (e) {
      setStatus('Search failed: ' + (e && e.message ? e.message : e));
    }
  }

  function fillFirstEmptyCamera(url, name) {
    let rows = Array.from(document.querySelectorAll('#cameras .camera-row'));
    let row = rows.find((r) => !r.querySelector('.cam-url').value.trim());
    if (!row) { addCameraRow(); rows = Array.from(document.querySelectorAll('#cameras .camera-row')); row = rows[rows.length - 1]; }
    if (!row) return;
    row.querySelector('.cam-url').value = url;
    if (name && !row.querySelector('.cam-name').value.trim()) row.querySelector('.cam-name').value = name;
  }

  async function useCandidate(c) {
    if (c.onvif) {
      const username = document.getElementById('ou').value.trim();
      const password = document.getElementById('op').value;
      setStatus('Getting RTSP URL from ' + c.ip + '…');
      try {
        const uri = await Homey.emit('resolveStreamUri', {
          ip: c.ip, onvifPort: c.onvifPort, username, password,
        });
        if (uri) { fillFirstEmptyCamera(uri, c.ip); setStatus('RTSP URL added from ONVIF.'); } else setStatus('No RTSP URL returned; enter it manually.');
      } catch (e) {
        setStatus('ONVIF failed (' + (e && e.message ? e.message : e) + '). Check the ONVIF username/password, or enter the URL manually.');
      }
    } else {
      fillFirstEmptyCamera('rtsp://' + c.ip + ':' + (c.rtspPort || 554) + '/', c.ip);
      setStatus('Template added — complete the path and credentials.');
    }
  }

  function fill(id, list, optional) {
    const sel = document.getElementById(id);
    sel.innerHTML = optional ? '<option value="">—</option>' : '';
    (list || []).forEach((d) => {
      const o = document.createElement('option');
      o.value = d.id;
      o.textContent = d.name;
      sel.appendChild(o);
    });
  }

  function nameOf(id) {
    const sel = document.getElementById(id);
    return sel.selectedOptions[0] ? sel.selectedOptions[0].textContent : '';
  }

  function cameraCount() {
    return document.querySelectorAll('#cameras .camera-row').length;
  }

  function addCameraRow() {
    const n = cameraCount() + 1;
    if (n > MAX_CAMERAS) return;
    const wrap = document.createElement('div');
    wrap.className = 'camera-row homey-form-group';
    wrap.innerHTML =
      '<label class="homey-form-label">Camera ' + n + (n === 1 ? ' (required)' : ' (optional)') + '</label>'
      + '<input class="homey-form-input cam-name" type="text" placeholder="Name (e.g. Front Door)" />'
      + '<input class="homey-form-input cam-url" type="text" placeholder="rtsp://user:pass@192.168.0.10:554/stream" />';
    document.getElementById('cameras').appendChild(wrap);
    document.getElementById('addCam').disabled = cameraCount() >= MAX_CAMERAS;
  }

  async function pair() {
    const rows = Array.from(document.querySelectorAll('#cameras .camera-row'));
    const cams = rows.map((r) => ({
      name: r.querySelector('.cam-name').value.trim(),
      url: r.querySelector('.cam-url').value.trim(),
    }));
    if (!cams[0] || !cams[0].url) { Homey.alert('Please enter the RTSP URL for Camera 1.'); return; }

    const settings = {
      lock_id: document.getElementById('lock').value,
      doorbell_id: document.getElementById('doorbell').value,
      motion_id: document.getElementById('motion').value,
      lock_name: nameOf('lock'),
      doorbell_name: nameOf('doorbell'),
      motion_name: nameOf('motion'),
    };
    cams.forEach((c, i) => {
      const suffix = i === 0 ? '' : '_' + (i + 1);
      settings['rtsp_url' + suffix] = c.url;
      settings['camera_name' + suffix] = c.name;
    });

    Homey.showLoadingOverlay();
    try {
      await Homey.createDevice({
        name: cams[0].name || 'Smart Door',
        data: { id: 'smartdoor-' + Date.now() },
        settings,
      });
      await Homey.done();
    } catch (e) {
      Homey.hideLoadingOverlay();
      Homey.alert(e && e.message ? e.message : String(e));
    }
  }
</script>

<div class="homey-form-group">
  <label class="homey-form-label">Find cameras on the network</label>
  <input class="homey-form-input" id="ou" type="text" placeholder="ONVIF username (for auto URL)" />
  <input class="homey-form-input" id="op" type="password" placeholder="ONVIF password" />
  <button class="homey-button-secondary-full" type="button" onclick="searchCameras()">Search cameras</button>
  <div id="results" style="margin-top: 6px;"></div>
</div>

<div id="cameras"></div>
<button class="homey-button-secondary-full" id="addCam" onclick="addCameraRow()">+ Add camera</button>

<div class="homey-form-group">
  <label class="homey-form-label" for="lock">Door lock (optional)</label>
  <select class="homey-form-select" id="lock"></select>
</div>
<div class="homey-form-group">
  <label class="homey-form-label" for="doorbell">Doorbell sensor (optional)</label>
  <select class="homey-form-select" id="doorbell"></select>
</div>
<div class="homey-form-group">
  <label class="homey-form-label" for="motion">Motion sensor (optional)</label>
  <select class="homey-form-select" id="motion"></select>
</div>

<p id="status" style="font-size: 0.8em; opacity: 0.7;"></p>

<button class="homey-button-primary-full" onclick="pair()">Add device</button>
